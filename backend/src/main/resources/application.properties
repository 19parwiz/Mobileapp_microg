# Server Configuration (Railway / Render set PORT; local default 8080)
server.port=${PORT:8080}
spring.application.name=microgreens-backend

# Database Configuration - PostgreSQL
# Defaults suit Docker Compose (postgres/postgres). Local Windows DB: set DATABASE_PASSWORD=54321 or use application-local.properties.
# Optional overrides: DATABASE_URL (jdbc:postgresql://…), DATABASE_USERNAME, DATABASE_PASSWORD
# Railway: link Postgres or set SPRING_DATASOURCE_URL=jdbc:postgresql://… (pooler URLs need sslmode=require as query params)
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/smart_microgreens_db}}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Almaty
spring.jackson.time-zone=Asia/Almaty

# Logging
logging.level.root=INFO
logging.level.com.aliparwiz.microgreens=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

# JWT Configuration (secret must be Base64; min 32 decoded bytes for HS256)
# Override in production: $env:JWT_SECRET='<long-random-base64>'
jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000

# AI Service Configuration (FastAPI /predict); override on Railway, e.g. https://your-ai.up.railway.app
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}
ai.service.api-key=your-api-key-here

# LLM Chat Configuration (Groq OpenAI-compatible API)
# Prefer setting GROQ_API_KEY/OPENAI_API_KEY in environment variables instead of committing secrets here.


# Application Info
app.name=Microgreens Management System
app.version=1.0.0
app.description=Spring Boot backend for microgreens management with IoT and AI integration
# Temporary toggle: disable email verification requirement for registration/login.
app.auth.require-email-verification=${APP_AUTH_REQUIRE_EMAIL_VERIFICATION:false}

# --- Email (set spring.mail.host to enable; see application.properties.example / SendGrid) ---
# app.mail.from=Microgreens <noreply@localhost>
# app.mail.fail-on-delivery-error=true
# Railway: set APP_PUBLIC_API_BASE_URL=https://your-api.up.railway.app (no trailing slash)
app.public-api-base-url=${APP_PUBLIC_API_BASE_URL:http://localhost:8080}
app.password-reset-web-base=${APP_PASSWORD_RESET_WEB_BASE:http://localhost:3000}
# CORS allowlist (comma-separated); keep strict in production.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
