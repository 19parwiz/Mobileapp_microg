name: diploma_mobile_app
description: A production-grade Flutter mobile application for microgreens management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.5+1
  
  # HTTP Client
  http: ^1.6.0
  dio: ^5.9.0
  
  # Secure Storage
  flutter_secure_storage: ^10.0.0
  
  # MQTT
  mqtt_client: ^10.11.3
  
  # Camera (latest compatible with your Flutter/Dart right now)
  camera: ^0.11.3
  
  # WebSocket
  web_socket_channel: ^3.0.3
  
  # Charts
  fl_chart: ^1.1.1
  
  # Video Player
  video_player: ^2.10.1
  chewie: ^1.13.0
  
  # Routing
  go_router: ^17.0.1
  
  # Dependency Injection
  get_it: ^9.2.0
  
  # Logging
  logger: ^2.6.2
  
  # Utils
  equatable: ^2.0.7
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "app_icon.png"
  adaptive_icon_background: "#F0FAF0"
  adaptive_icon_foreground: "app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
